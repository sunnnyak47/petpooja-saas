# ====================================================================
# PETPOOJA ERP — Docker Compose Production Stack
# Includes: API, PostgreSQL 16, Redis 7, Nginx reverse proxy
# ====================================================================

version: '3.9'

services:
  # ------------------------------------------------------------------
  # PostgreSQL 16 Database
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: petpooja-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-petpooja}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-petpooja_secret_2026}
      POSTGRES_DB: ${DB_NAME:-petpooja_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-petpooja} -d ${DB_NAME:-petpooja_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petpooja-network

  # ------------------------------------------------------------------
  # Redis 7 (Caching, JWT blacklist, sessions, rate limiting)
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: petpooja-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-petpooja_redis_2026}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-petpooja_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - petpooja-network

  # ------------------------------------------------------------------
  # Petpooja ERP API (Node.js + Express)
  # ------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petpooja-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001

      # Database
      DATABASE_URL: postgresql://${DB_USER:-petpooja}:${DB_PASSWORD:-petpooja_secret_2026}@postgres:5432/${DB_NAME:-petpooja_erp}?schema=public

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-petpooja_redis_2026}@redis:6379

      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d

      # CORS
      CORS_WHITELIST: ${CORS_WHITELIST:-http://localhost,http://localhost:3001,http://localhost:3002}

      # Integrations (optional)
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      SWIGGY_WEBHOOK_SECRET: ${SWIGGY_WEBHOOK_SECRET:-}
      ZOMATO_WEBHOOK_SECRET: ${ZOMATO_WEBHOOK_SECRET:-}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
    ports:
      - "5001:5001"
    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    networks:
      - petpooja-network

  # ------------------------------------------------------------------
  # Nginx Reverse Proxy (TLS termination + static file serving)
  # ------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: petpooja-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - petpooja-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_uploads:
    driver: local
  api_logs:
    driver: local

networks:
  petpooja-network:
    driver: bridge
