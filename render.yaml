services:
  - type: web
    name: petpooja-saas
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: APP_NAME
        value: Petpooja ERP
      - key: APP_URL
        value: https://petpooja-saas.onrender.com
      - key: FRONTEND_URL
        value: https://petpooja-ms-rm.vercel.app
      - key: CORS_WHITELIST
        value: https://petpooja-ms-rm.vercel.app,https://petpooja-saas.vercel.app
      - key: BCRYPT_ROUNDS
        value: 12
      - key: RATE_LIMIT_GENERAL
        value: 200
      - key: RATE_LIMIT_AUTH
        value: 30
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_S3_BUCKET
        value: petpooja-erp-assets
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
