name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: lint + full Jest suite against a real Postgres ────────────────
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: msrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 0
      DATABASE_URL: postgresql://ci:ci@localhost:5432/msrm_test
      # REDIS_URL intentionally unset → backend uses its built-in no-op mock.
      JWT_ACCESS_SECRET: ci-test-access-secret-256-bit-minimum-length-key
      JWT_REFRESH_SECRET: ci-test-refresh-secret-256-bit-minimum-length-key
      JWT_SECRET: ci-test-access-secret-256-bit-minimum-length-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply schema to test database
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Seed reference data (roles, etc.)
        run: npm run prisma:seed

      # Blocking: the source is lint-clean (0 errors). Warnings are allowed;
      # any new error fails the build.
      - name: Lint
        run: npm run lint

      - name: Run test suite
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  # ─── Frontend: production build must succeed ────────────────────────────────
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
