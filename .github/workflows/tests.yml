name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Jest Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      PORT: 0
      JWT_ACCESS_SECRET: ci-test-access-secret-256-bit-minimum-length-key
      JWT_REFRESH_SECRET: ci-test-refresh-secret-256-bit-minimum-length-key
      # DB not available in CI — tests gracefully skip DB-dependent cases
      DATABASE_URL: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit & smoke tests
        run: npm test -- --testPathPattern="security" --no-coverage --forceExit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7
