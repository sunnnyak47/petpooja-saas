name: Windows Installer Build

on:
  push:
    tags:
      - 'v*.*.*'         # Trigger on version tags e.g. v2.0.3
  workflow_dispatch:      # Allow manual trigger from GitHub UI
    inputs:
      version:
        description: 'Build version (e.g. 2.0.4)'
        required: false
        default: 'dev'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows NSIS Installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Vite)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://petpooja-saas.onrender.com' }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL || 'https://petpooja-saas.onrender.com' }}

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Sync frontend dist into desktop
        working-directory: desktop
        run: npm run sync-frontend

      - name: Build Windows installer
        working-directory: desktop
        run: npm run build:win
        env:
          # Code-signing (optional — skipped if secrets not set)
          CSC_LINK:     ${{ secrets.WIN_CERTIFICATE_PFX || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD || '' }}
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        working-directory: desktop
        shell: bash
        run: find dist -name "*.exe" -o -name "*.msi" 2>/dev/null | head -10 || true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.ref_name }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.msi
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/*.exe
            desktop/dist/*.msi
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
