<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1C3F"/>
      <stop offset="100%" style="stop-color:#1A2D5A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD166"/>
      <stop offset="100%" style="stop-color:#E8A020"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <!-- Subtle top shine -->
    <radialGradient id="shine" cx="50%" cy="0%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <filter id="gs" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="gg" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#FFD166" flood-opacity="0.55"/>
    </filter>
    <filter id="bg2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#2563EB" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ── Background rounded square ── -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#shine)"/>

  <!-- ── PLATE ── large, bold circle -->
  <circle cx="512" cy="480" r="285" fill="#0A1628" filter="url(#gs)"/>
  <!-- Plate gold rim -->
  <circle cx="512" cy="480" r="285" fill="none" stroke="url(#gold)" stroke-width="10"/>
  <!-- Inner ring subtle -->
  <circle cx="512" cy="480" r="248" fill="none" stroke="#1E3A6E" stroke-width="3"/>

  <!-- ── FORK (left) — thick & bold ── -->
  <g filter="url(#gg)">
    <!-- Fork handle — thick rounded rect -->
    <rect x="364" y="435" width="28" height="165" rx="14" fill="url(#gold)"/>
    <!-- Fork neck -->
    <rect x="373" y="340" width="10" height="104" rx="5" fill="url(#gold)"/>
    <!-- 4 tines — thick, clearly visible -->
    <rect x="348" y="258" width="9" height="90" rx="4.5" fill="url(#gold)"/>
    <rect x="362" y="252" width="9" height="96" rx="4.5" fill="url(#gold)"/>
    <rect x="376" y="252" width="9" height="96" rx="4.5" fill="url(#gold)"/>
    <rect x="390" y="258" width="9" height="90" rx="4.5" fill="url(#gold)"/>
    <!-- Tine base connector -->
    <rect x="348" y="338" width="51" height="12" rx="6" fill="url(#gold)"/>
  </g>

  <!-- ── KNIFE (right) — thick & bold ── -->
  <g filter="url(#gg)">
    <!-- Handle -->
    <rect x="632" y="435" width="28" height="165" rx="14" fill="url(#gold)"/>
    <!-- Handle grip lines -->
    <rect x="634" y="468" width="24" height="5" rx="2.5" fill="#C8780A" opacity="0.6"/>
    <rect x="634" y="482" width="24" height="5" rx="2.5" fill="#C8780A" opacity="0.6"/>
    <rect x="634" y="496" width="24" height="5" rx="2.5" fill="#C8780A" opacity="0.6"/>
    <!-- Blade — flat left edge, curved right -->
    <path d="M634,250 L634,440 L660,440 L660,300 Q660,250 634,250 Z" fill="url(#gold)"/>
    <!-- Blade edge highlight -->
    <line x1="636" y1="258" x2="636" y2="435" stroke="#FFE599" stroke-width="2.5" opacity="0.5"/>
  </g>

  <!-- ── Center: Bold analytics bars — ERP identity ── -->
  <g filter="url(#bg2)">
    <!-- Bar 1 -->
    <rect x="460" y="430" width="30" height="80" rx="6" fill="url(#blue)" opacity="0.95"/>
    <!-- Bar 2 tallest -->
    <rect x="499" y="395" width="30" height="115" rx="6" fill="#60A5FA" opacity="1"/>
    <!-- Bar 3 -->
    <rect x="538" y="415" width="30" height="95" rx="6" fill="url(#blue)" opacity="0.95"/>
    <!-- Trend line gold -->
    <polyline points="475,430 514,395 553,415"
      fill="none" stroke="url(#gold)" stroke-width="5"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dots -->
    <circle cx="475" cy="430" r="7" fill="#FFD166"/>
    <circle cx="514" cy="395" r="7" fill="#FFD166"/>
    <circle cx="553" cy="415" r="7" fill="#FFD166"/>
  </g>

  <!-- ── Wordmark — bold, readable ── -->
  <!-- "MS-RM" large gold -->
  <text x="512" y="638"
        font-family="Arial Black, Arial, sans-serif"
        font-size="68"
        font-weight="900"
        letter-spacing="4"
        text-anchor="middle"
        fill="url(#gold)"
        filter="url(#gg)">MS-RM</text>

  <!-- "ERP SYSTEM" small blue tag -->
  <rect x="376" y="654" width="272" height="34" rx="17" fill="#1D4ED8" opacity="0.9"/>
  <text x="512" y="678"
        font-family="Arial, sans-serif"
        font-size="19"
        font-weight="700"
        letter-spacing="7"
        text-anchor="middle"
        fill="#FFFFFF"
        opacity="0.95">ERP SYSTEM</text>

  <!-- ── Outer border glow ── -->
  <rect x="5" y="5" width="1014" height="1014" rx="217" ry="217"
        fill="none" stroke="#2A4A8A" stroke-width="4" opacity="0.6"/>
</svg>
