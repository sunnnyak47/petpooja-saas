<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main background gradient: deep navy to rich indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1120;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#101D3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162347;stop-opacity:1" />
    </linearGradient>

    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4C430;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8A020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8780A;stop-opacity:1" />
    </linearGradient>

    <!-- Blue glow gradient for plate ring -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle inner shine -->
    <radialGradient id="shine" cx="38%" cy="32%" r="55%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.07" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <!-- Gold glow -->
    <filter id="goldGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#F4C430" flood-opacity="0.5"/>
    </filter>

    <!-- Blue glow -->
    <filter id="blueGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#3B82F6" flood-opacity="0.6"/>
    </filter>

    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- Inner shine overlay -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#shine)"/>

  <!-- Subtle grid texture lines (ERP feel) -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- ── PLATE RING (outer) ── -->
  <!-- Deep blue outer ring with glow -->
  <circle cx="512" cy="470" r="258" fill="none" stroke="url(#blueGrad)" stroke-width="14" filter="url(#blueGlow)" opacity="0.9"/>

  <!-- Plate body -->
  <circle cx="512" cy="470" r="240" fill="#0D1B33" opacity="0.95"/>

  <!-- Plate rim highlight (thin gold) -->
  <circle cx="512" cy="470" r="240" fill="none" stroke="url(#goldGrad)" stroke-width="3.5" opacity="0.7"/>

  <!-- Inner plate ring -->
  <circle cx="512" cy="470" r="200" fill="#0F2040" opacity="0.9"/>
  <circle cx="512" cy="470" r="200" fill="none" stroke="#1E3A5F" stroke-width="2"/>

  <!-- ── FORK (left) ── -->
  <g filter="url(#goldGlow)">
    <!-- Fork handle -->
    <rect x="382" y="390" width="18" height="140" rx="9" fill="url(#goldGrad)"/>
    <!-- Fork neck -->
    <rect x="387" y="320" width="8" height="78" rx="4" fill="url(#goldGrad)"/>
    <!-- Fork tines (4) -->
    <rect x="370" y="272" width="5" height="58" rx="2.5" fill="url(#goldGrad)"/>
    <rect x="380" y="268" width="5" height="62" rx="2.5" fill="url(#goldGrad)"/>
    <rect x="390" y="268" width="5" height="62" rx="2.5" fill="url(#goldGrad)"/>
    <rect x="400" y="272" width="5" height="58" rx="2.5" fill="url(#goldGrad)"/>
  </g>

  <!-- ── KNIFE (right) ── -->
  <g filter="url(#goldGlow)">
    <!-- Knife handle -->
    <rect x="626" y="390" width="18" height="140" rx="9" fill="url(#goldGrad)"/>
    <!-- Knife blade body -->
    <rect x="628" y="270" width="14" height="128" rx="4" fill="url(#goldGrad)"/>
    <!-- Blade edge (sharp taper at top) -->
    <path d="M628,270 Q628,250 642,248 L642,270 Z" fill="url(#goldGrad)"/>
  </g>

  <!-- ── SPOON (center, smaller) — data/chart symbol ── -->
  <!-- Replaced with a clean analytics chart to reinforce ERP identity -->
  <!-- Bar chart inside plate -->
  <g filter="url(#blueGlow)">
    <!-- Bar 1 -->
    <rect x="448" y="430" width="26" height="64" rx="5" fill="#3B82F6" opacity="0.9"/>
    <!-- Bar 2 (tallest) -->
    <rect x="486" y="400" width="26" height="94" rx="5" fill="#60A5FA" opacity="0.95"/>
    <!-- Bar 3 -->
    <rect x="524" y="418" width="26" height="76" rx="5" fill="#3B82F6" opacity="0.9"/>
    <!-- Trend line -->
    <polyline points="461,430 499,400 537,418" fill="none" stroke="#F4C430" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#goldGlow)"/>
    <!-- Trend dots -->
    <circle cx="461" cy="430" r="5.5" fill="#F4C430" filter="url(#goldGlow)"/>
    <circle cx="499" cy="400" r="5.5" fill="#F4C430" filter="url(#goldGlow)"/>
    <circle cx="537" cy="418" r="5.5" fill="#F4C430" filter="url(#goldGlow)"/>
  </g>

  <!-- ── BOTTOM WORDMARK ── -->
  <!-- "MS-RM" in gold -->
  <text x="512" y="612"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="52"
        font-weight="800"
        letter-spacing="6"
        text-anchor="middle"
        fill="url(#goldGrad)"
        filter="url(#goldGlow)">MS-RM</text>

  <!-- "ERP" subtitle in blue -->
  <text x="512" y="656"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="26"
        font-weight="600"
        letter-spacing="14"
        text-anchor="middle"
        fill="#60A5FA"
        opacity="0.9">SYSTEM</text>

  <!-- ── TOP BADGE — small ERP chip ── -->
  <rect x="432" y="152" width="160" height="38" rx="19" fill="#1D4ED8" opacity="0.85" filter="url(#blueGlow)"/>
  <text x="512" y="177"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="18"
        font-weight="700"
        letter-spacing="5"
        text-anchor="middle"
        fill="#FFFFFF"
        opacity="0.95">ERP</text>

  <!-- Outer border subtle glow line -->
  <rect x="3" y="3" width="1018" height="1018" rx="222" ry="222" fill="none" stroke="#1E3A6E" stroke-width="6" opacity="0.5"/>
</svg>
